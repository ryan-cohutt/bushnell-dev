<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Capriola&family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=Salsa&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <!-- <div class="map-wrapper">
        <svg class="connections"></svg>
        <div class="map"></div>
    </div> -->

    <div id="settings-panel" class="settings-overlay">
        <div class="content">
            <h1 class="caprasimo">Settings</h1>
            <div class="settings-tabs">
                <div class="tab">
                    <p class="caprasimo">LANGUAGE</p>
                    <button class="salsa">English</button>
                </div>
                <div class="tab">
                    <p class="caprasimo">AUDIO</p>
                    <button class="salsa">Prefer Text to Speech</button>
                    <button class="salsa">Prefer Text Only</button>
                </div>
                <div class="tab">
                    <p class="caprasimo">VISUALS</p>
                    <button class="salsa">Low Motion</button>
                    <button class="salsa">High Contrast</button>
                </div>
                <div class="tab">
                    <p class="caprasimo">TEXT</p>
                    <button class="salsa">Text Speed  -  1  +</button>
                    <button class="salsa">Font Size  -  1  +</button>
                </div>
                <button id="save-settings" class="caprasimo">SAVE</button>
            </div>
        </div>
    </div>

    <!-- <div class="card" id="card"></div> -->
    <div class="map-cont">
        <button class="settings" id="settings-btn">
            <img src="visuals-updated/settings.png" alt="">
        </button>
        <div class="chapter-header">
            <h1 class="caprasimo">Select Chapter</h1>
        </div>
        <div class="chapter-map">
            <div class="map-row-1">
                <button class="chapter-btn" id="chapter-1">
                    <h1 class="salsa">REGRET</h1>
                </button>
                <img src="visuals-updated/line-1.png" alt="" class="line-1">
                <button class="chapter-btn chapter-faded" id="chapter-2">
                    <h1 class="salsa">INNOCENCE</h1>
                </button>
                <img src="visuals-updated/line-2.png" alt="" class="line-1">
                <button class="chapter-btn chapter-faded" id="chapter-3">
                    <h1 class="salsa"></h1>
                </button>
            </div>
            <div class="map-row-2">
                <button class="chapter-btn chapter-faded" id="chapter-4">
                    <h1 class="salsa"></h1>
                </button>
                <img src="visuals-updated/line-3.png" alt="" class="line-2" id="line-2">
                <img src="visuals-updated/line-4.png" alt="" class="line-2">
                <button class="chapter-btn chapter-faded" id="chapter-5">
                    <h1 class="salsa"></h1>
                </button>
            </div>

        </div>
    </div>
    
    <div id="chapter-popup" class="popup-overlay">
        <div class="popup-content">
            <button id="close-popup">
                <img src="visuals-updated/blue-arrow.png" alt="">
            </button>
            <p id="popup-book" class="salsa">Book Chapter</p>
            <h1 id="popup-title" class="caprasimo">Chapter Title</h1>
            <h2 id="popup-description" class="caprasimo">Chapter description goes here...</h2>
            <a href="" id="popup-link" class=""><p class="caprasimo">PLAY</p></a href="">
        </div>
    </div>

    <img src="visuals-updated/school-faded.png" alt="" id="bg-img">
    <script src="js/map.js"></script>
</body>
</html>
