<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/text-adventure.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Capriola&family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=Salsa&display=swap&family=Damion&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div id="settings-panel" class="settings-overlay">
        <div class="content">
            <h1 class="caprasimo">Settings</h1>
            <div class="settings-tabs">
                <div class="tab">
                    <p class="caprasimo">LANGUAGE</p>
                    <button class="salsa">English</button>
                </div>
                <div class="tab">
                    <p class="caprasimo">AUDIO</p>
                    <button class="salsa">Prefer Text to Speech</button>
                    <button class="salsa">Prefer Text Only</button>
                </div>
                <div class="tab">
                    <p class="caprasimo">VISUALS</p>
                    <button class="salsa">Low Motion</button>
                    <button class="salsa">High Contrast</button>
                </div>
                <div class="tab">
                    <p class="caprasimo">TEXT</p>
                    <button class="salsa">Text Speed  -  1  +</button>
                    <button class="salsa">Font Size  -  1  +</button>
                </div>
                <button id="save-settings" class="caprasimo">SAVE</button>
            </div>
        </div>
    </div>

    <div id="intro-overlay" class="intro-box active">
        <div class="intro-content">
            <img src="./visuals-updated/newspaper.png" alt="">
            <button id="start-adventure" class="caprasimo">CONTINUE</button>
        </div>
    </div>
    <div id="diary-overlay" class="intro-box" style="display:none">
        <div class="intro-content">
            <!-- <img src="./visuals-updated/notebook.png" alt="Diary" style="width: 80%; max-height: 50vh; object-fit: contain;"> -->
             <p class="damion">Dear Diary,</p>
            <div id="diary-text-container" class="damion">
                </div>
            <button id="close-diary" class="caprasimo">CONTINUE</button>
        </div>
    </div>

    <div class="adventure-cont" id="main-ui" style="opacity: 0; pointer-events: none;">
        <div class="icons">
            <button class="settings" id="settings-btn"><img src="visuals-updated/settings.png"></button>
            <a href="./dottie.html"><button class="dottie-icon"><img src="visuals-updated/smile-icon.png"></button></a>
        </div>

        <div class="options" id="options-container">
            </div>

        <div class="notebook">
            <div class="notebook-div">
                <button class="back-btn"><img src="visuals-updated/purple-arrow.png"></button>
                <p id="adventure-text" class="capriola"></p>
                <button id="next-btn" class="next-btn caprasimo" style="display: none;">NEXT</button>
            </div>
            <img src="visuals-updated/notebook.png" id="notebook-bg" alt="">
        </div>
    </div>

    <img src="visuals-updated/living-room.jpg" alt="" id="bg-img">
    <script src="js/text-adventure.js" defer></script>
</body>
</html>
