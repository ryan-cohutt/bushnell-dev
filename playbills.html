<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/playbills.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Capriola&family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=Salsa&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="theatre-experience">
        <h1 class="selection-title caprasimo">Select Your Story</h1>
        
        <div class="carousel-wrapper">
            <div class="carousel-stage" id="carouselStage"></div>
        </div>

        <div class="controls">
            <button id="prevBtn" class="nav-btn">
                <img src="visuals-updated/arrow-left.png" alt="">
            </button>
            <div class="counter-container">
                <span id="playTitle" class="caprasimo">LOADING...</span>
                <span id="counter" class="salsa">0/0</span>
            </div>
            <button id="nextBtn" class="nav-btn">
                <img src="visuals-updated/arrow-right.png" alt="">
            </button>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-content" id="modalContent">
            <div class="modal-left" id="modalImg">
            </div>
            <div class="modal-right">
                <button class="back-arrow" id="closeBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <path d="M23.9981 37.9968L9.99927 23.998M9.99927 23.998L23.9981 9.99915M9.99927 23.998H37.9969" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <p class="meta-data salsa" id="modalMeta"></p>
                <h2 class="display-title caprasimo" id="modalTitle"></h2>
                <div class="cast-info salsa">
                    <p>Cast:</p>
                    <p><span id="modalCast"></span></p>
                </div>
                
                <p class="description salsa" id="modalDesc"></p>
                <button class="play-button-final caprasimo">PLAY</button>
            </div>
        </div>
    </div>
    <script src="js/playbills.js"></script>
</body>
</html>
